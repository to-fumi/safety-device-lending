<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全端末管理</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* @import url('fonts/google-fonts.css'); */

    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --surface2: #1e2026;
      --border: #2a3d35;
      --border2: #363a45;
      --accent: #4ade80;
      --accent-dim: rgba(74, 222, 128, 0.12);
      --accent-dim2: rgba(74, 222, 128, 0.06);
      --warn: #fb923c;
      --warn-dim: rgba(251, 146, 60, 0.12);
      --danger: #f87171;
      --danger-dim: rgba(248, 113, 113, 0.12);
      --text: #e8eaf0;
      --text-muted: #6b7280;
      --text-dim: #9ca3af;
      --mono: 'DM Mono', monospace;
      --sans: 'Noto Sans JP', sans-serif;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 56px 1fr;
      min-height: 100vh;
    }

    header {
      grid-column: 1/-1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }

    .logo {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: .08em;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: opacity .15s;
    }

    .logo:hover {
      opacity: 0.8;
    }

    .logo-icon {
      width: 22px;
      height: 22px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 13px;
      height: 13px;
    }

    header .sep {
      flex: 1;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .admin-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all .15s;
    }

    .admin-btn:hover {
      background: var(--surface2);
      color: var(--accent);
    }

    .admin-btn svg {
      width: 18px;
      height: 18px;
    }

    .header-stat {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot-live {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    aside {
      display: none;
    }

    .nav-section {
      padding: 0 16px;
      margin-bottom: 8px;
    }

    .nav-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0 8px;
      margin-bottom: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 15px;
      transition: all .15s;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      background: var(--surface2);
      color: var(--text-dim);
    }

    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(74, 222, 128, .2);
    }

    .nav-item svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    main {
      padding: 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .page-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .page-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
      font-family: var(--mono);
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      border-radius: 2px 2px 0 0;
    }

    .stat-card.green::after {
      background: var(--accent);
    }

    .stat-card.orange::after {
      background: var(--warn);
    }

    .stat-card.blue::after {
      background: #60a5fa;
    }

    .stat-card.purple::after {
      background: #a78bfa;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .08em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 36px;
      font-weight: 500;
      line-height: 1;
    }

    .stat-value .stat-denominator {
      font-size: 20px;
      color: var(--text-muted);
      margin-left: 4px;
      vertical-align: baseline;
    }

    .stat-card.green .stat-value {
      color: var(--accent);
    }

    .stat-card.orange .stat-value {
      color: var(--warn);
    }

    .stat-card.blue .stat-value {
      color: #60a5fa;
    }

    .stat-card.purple .stat-value {
      color: #a78bfa;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text);
    }

    .panel-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      flex-shrink: 0;
    }

    .panel-header .sep {
      flex: 1;
    }

    .form-grid {
      display: grid;
      gap: 10px;
      padding: 16px 20px;
      align-items: end;
    }

    .form-grid.cols-6 {
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto;
    }

    .form-grid.cols-5 {
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
    }

    .form-grid.cols-4 {
      grid-template-columns: 1fr 1fr 1fr auto;
    }

    .form-grid.cols-3 {
      grid-template-columns: 1fr 1fr auto;
    }

    .form-grid.cols-2 {
      grid-template-columns: 1fr auto;
    }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .field select option {
      background: var(--surface);
    }

    .field-help {
      margin-top: 6px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .field-help.ok {
      color: var(--accent);
    }

    .field-help.warn {
      color: var(--warn);
    }

    .guide-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      min-height: 64px;
    }

    .guide-step {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-dim);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      animation: pulse 1.3s ease-in-out infinite;
    }

    .guide-text {
      font-size: 17px;
      color: var(--text-dim);
      line-height: 1.55;
      font-weight: 500;
    }

    .device-scan-field {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }

    .device-detected {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 10px 12px;
      height: 42px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: border-color .2s, color .2s;
    }

    .device-detected.found {
      color: var(--accent);
      border-color: rgba(74, 222, 128, .4);
      background: var(--accent-dim);
    }

    .device-detected.miss {
      color: var(--danger);
      border-color: rgba(248, 113, 113, .4);
      background: var(--danger-dim);
    }

    .btn-camera {
      background: var(--accent);
      color: #0a1a0a;
      border: none;
      border-radius: 7px;
      padding: 0 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: all .15s;
      flex-shrink: 0;
      height: 42px;
    }

    .btn-camera:hover {
      background: #86efac;
      transform: translate(-1px);
    }

    .btn-camera:disabled {
      opacity: .4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-camera svg {
      width: 14px;
      height: 14px;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a1a0a;
      border: none;
      border-radius: 7px;
      padding: 10px 20px;
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: .03em;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 42px;
    }

    .btn-primary:hover {
      background: #86efac;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 0 14px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .03em;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 42px;
    }

    .btn-secondary:hover {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(74, 222, 128, .3);
    }

    .btn-secondary:disabled {
      opacity: .4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .ret-type-segment {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .ret-type-btn {
      height: 38px;
      padding: 8px 20px;
      border: 1px solid var(--border2);
      border-radius: 7px;
      background: var(--bg);
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }

    .ret-type-btn:hover {
      border-color: rgba(74, 222, 128, .35);
      color: var(--text);
    }

    .ret-type-btn:active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: rgba(74, 222, 128, .35);
    }

    .ret-type-btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    @media (max-width: 900px) {
      .ret-type-segment {
        grid-template-columns: 1fr;
      }
    }

    .ret-summary {
      font-size: 13px;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
    }

    .ret-maint-note {
      font-size: 13px;
      color: var(--warn);
      background: var(--warn-dim);
      border: 1px solid rgba(251, 146, 60, .35);
      border-radius: 7px;
      padding: 8px 10px;
      display: none;
    }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, .3);
      border-radius: 7px;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-danger:hover {
      background: rgba(248, 113, 113, .2);
    }

    .btn-danger:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    thead tr {
      background: var(--surface2);
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
      font-weight: 500;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
      vertical-align: middle;
    }

    tbody tr:hover td {
      background: var(--accent-dim2);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .device-id {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      background: var(--surface2);
      padding: 4px 9px;
      border-radius: 5px;
      border: 1px solid var(--border2);
    }

    .status-pill {
      font-family: var(--mono);
      font-size: 13px;
      padding: 4px 11px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .status-pill::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .status-lending {
      background: var(--warn-dim);
      color: var(--warn);
      border: 1px solid rgba(251, 146, 60, .25);
    }

    .status-lending::before {
      background: var(--warn);
    }

    .status-returned {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(74, 222, 128, .2);
    }

    .status-returned::before {
      background: var(--accent);
    }

    .status-avail {
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(74, 222, 128, .2);
    }

    .status-avail::before {
      background: var(--accent);
    }

    .status-broken {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, .3);
    }

    .status-broken::before {
      background: var(--danger);
    }

    .status-retired {
      background: rgba(156, 163, 175, .18);
      color: #d1d5db;
      border: 1px solid rgba(156, 163, 175, .35);
    }

    .status-retired::before {
      background: #d1d5db;
    }

    .time-cell {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-muted);
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-input {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      width: 220px;
      transition: border-color .15s;
    }

    .filter-input:focus {
      border-color: var(--accent);
    }

    .filter-select {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 8px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .error-msg {
      color: #f87171;
      font-family: var(--mono);
      font-size: 14px;
      padding: 10px 20px;
    }

    .empty {
      padding: 48px;
      text-align: center;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 14px;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
      transform: translateY(80px);
      opacity: 0;
      transition: all .3s cubic-bezier(.22, 1, .36, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.error {
      border-color: #f87171;
      color: #f87171;
    }

    .mgmt-top-row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      margin-bottom: 8px;
      align-items: stretch;
    }

    .mgmt-employee-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      width: fit-content;
    }

    .mgmt-employee-section .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 0 0 auto;
    }

    .mgmt-employee-section .field label {
      font-size: 11px;
    }

    .mgmt-employee-section .field input {
      font-size: 14px;
      padding: 8px 10px;
      height: 38px;
      width: 230px;
    }

    .mgmt-stats-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      min-width: 0;
    }

    .mgmt-stats-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .mgmt-stats-section .stats-row {
      grid-template-columns: repeat(4, minmax(120px, 1fr));
    }

    .mgmt-stats-section .stat-card {
      padding: 12px 14px;
    }

    .mgmt-stats-section .stat-label {
      margin-bottom: 6px;
      font-size: 11px;
    }

    .mgmt-stats-section .stat-value {
      font-size: 24px;
    }

    .mgmt-stats-section .stat-value .stat-denominator {
      font-size: 16px;
    }

    .mgmt-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 1200px) {
      .mgmt-container {
        grid-template-columns: 1fr;
      }

      .mgmt-top-row {
        grid-template-columns: 1fr;
      }

      .mgmt-employee-section {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
      }

      .mgmt-employee-section .field input {
        width: 100%;
      }
    }

    @media (max-width: 900px) {
      .mgmt-stats-section .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .mgmt-lend-container,
    .mgmt-return-container {
      display: flex;

  <script src="https://unpkg.com/@zxing/browser@0.1.5/umd/zxing-browser.min.js"></script>
  <script>
    const API = '';
    let filterStatus = 'all', filterQuery = '', filterEventType = 'all';
    let isAdmin = false;
    let isBrokenDeviceDetected = false;

    let cameraStream = null;
    let codeReader = null;
    let cameraTargetId = null;
    let lastScanned = null;
    let scanning = false;

    let lendScanCandidates = [];
    let returnScanCandidates = [];
    let spLendScanCandidates = [];
    let returnSelectionsByType = {
      full_set: null,
      smartphone_only: null,
      dock_and_cable_only: null,
    };

    function resetReturnSelections() {
      returnSelectionsByType = {
        full_set: null,
        smartphone_only: null,
        dock_and_cable_only: null,
      }
    }

    function setReturnSelection(type, loanId) {
      if (!(type in returnSelectionsByType)) return;
      returnSelectionsByType[type] = loanId ? Number(loanId) : null;
    }

    function applyReturnSelection(type) {
      const hidden = document.getElementById('ret-loan-val');
      const detectedEl = document.getElementById('ret-detected');
      if (!hidden || !detectedEl) return;

      const selectedId = returnSelectionsByType[type];
      const candidates = getReturnCandidatesByType(type);
      const selected = candidates.find(c => c.value === selectedId);

      if (selected) {
        hidden.value = String(selected.value);
        detectedEl.textContent = `${selected.no}`;
        detectedEl.className = 'device-detected found';
      } else {
        hidden.value = '';
        detectedEl.textContent = '未検出';
        detectedEl.className = 'device-detected';
      }
    }

    function getCurrentReturnType() {
      return document.getElementById('ret-return-type')?.value || 'full_set';
    }

    function getReturnCandidatesByType(type) {
      const targetType = type || getCurrentReturnType();
      if (targetType === 'dock_and_cable_only') {
        return returnScanCandidates.filter(c => !c.is_smartphone_out && (c.is_dock_out || c.is_cable_out));
      }
      if (targetType === 'smartphone_only') {
        return returnScanCandidates.filter(c => c.is_smartphone_out);
      }
      if (targetType === 'full_set') {
        return returnScanCandidates.filter(c => c.is_smartphone_out && (c.is_dock_out || c.is_cable_out));
      }
      return returnScanCandidates;
    }

    function updateManagementStats(devices, allLoans) {
      const statsRoot = document.getElementById('mgmt-stats');
      if (!statsRoot) return;

      const activeDevices = devices.filter(d => d.status === 'active');
      const nonLendableDeviceIds = new Set(devices.filter(d => d.status !== 'active').map(d => d.id));

      const lendingLoans = allLoans.filter(isLoanActive);
      const lendingLoansActive = lendingLoans.filter(l => !nonLendableDeviceIds.has(l.device_id));
      const smartphoneOutDeviceIds = new Set(
        lendingLoansActive.filter(isPhoneOut).map(l => l.device_id)
      );
      const smartphoneStockCount = activeDevices.filter(d => !smartphoneOutDeviceIds.has(d.id)).length;
      const availableDevices = devices.filter(d => !d.is_lending && d.status === 'active');
      const today = new Date().toISOString().slice(0, 10);
      const todayCount= allLoans.filter(
        l => (l.lent_at || '').startsWith(today) || (l.smartphone_relent_at || '').startsWith(today)
      ).length;

      statsRoot.innerHTML = `
		<div class="stat-card orange"><div class="stat-label">貸出中</div><div class="stat-value" id="mgmt-lending">-</div></div>
		<div class="stat-card green"><div class="stat-label">利用可能</div><div class="stat-value" id="mgmt-avail">-</div></div>
		<div class="stat-card blue"><div class="stat-label">スマホ一時保管・充電台数</div><div class="stat-value" id="mgmt-phone-stock">-</div></div>
		<div class="stat-card purple"><div class="stat-label">本日貸出</div><div class="stat-value" id="mgmt-today">-</div></div>
	`;
      document.getElementById('mgmt-lending').innerHTML = `${lendingLoansActive.length}<span class="stat-denominator">/ ${activeDevices.length}</span>`;
      document.getElementById('mgmt-avail').innerHTML = `${availableDevices.length}<span class="stat-denominator">/ ${activeDevices.length}</span>`;
      document.getElementById('mgmt-phone-stock').innerHTML = `${smartphoneStockCount}<span class="stat-denominator">/ ${activeDevices.length}</span>`;
      document.getElementById('mgmt-today').textContent = todayCount;

      lendScanCandidates = devices.map(d => ({
        value: d.id,
        no: (d.no || '').toString().trim(),
        device_id_code: d.device_id_code,
        status: d.status,
        is_lending: d.is_lending,
      }));

      returnScanCandidates = lendingLoans.map(l => ({
        value: l.id,
        no: (l.device.no || '').toString().trim(),
        device_id_code: l.device.device_id_code,
        status: l.device.status,
        user_employee_id: l.user_employee_id || '',
        is_smartphone_out: !!l.is_smartphone_out,
        is_dock_out: !!l.is_dock_out,
        is_cable_out: !!l.is_cable_out,
        active_sp_employee_id: (l.smartphone_loans || []).find(sl => !sl.returned_at)?.user_employee_id || null,
      }));

      spLendScanCandidates = lendingLoans
        .filter(l => !l.is_smartphone_out && (l.is_dock_out || l.is_cable_out))
        .map(l => ({
          value: l.id,
          no: (l.device.no || '').toString().trim(),
          device_id_code: l.device.device_id_code,
        }));

      window.mgmtAllLoans = allLoans;
      window.mgmtAllDevices = devices;
    }

    async function refreshManagementStats() {
      const statsRoot = document.getElementById('mgmt-stats');
      if (!statsRoot) return;
      const [devices, allLoans] = await Promise.all([
        apiFetch('/devices'),
        apiFetch('loans?limit=500')
      ]);
      updateManagementStats(devices, allLoans);
    }

    async function openCamera(targetId) {
      cameraTargetId = targetId;
      lastScanned = null;
      scanning = false;

      if (targetId === 'ret') {
        const currentType = getCurrentReturnType();
        const candidates = getReturnCandidatesByType(currentType);
        if (candidates.length === 0) {
          const detectedEl = document.getElementById('ret-detected');
          const retLoanVal = document.getElementById('ret-loan-val');
          const retBtn = document.getElementById('ret-btn');
          let missLabel = '対象外：返却済みの端末です。';
          if (currentType === 'smartphone_only') {
            missLabel = '対象外：返却済みのスマホです。';
          } else if (currentType === 'dock_and_cable_only') {
            missLabel = '該当する台座・コードは存在しません。';
          }
          if (detectedEl) {
            detectedEl.textContent = missLabel;
            detectedEl.className = 'device-detected miss';
          }
          if (retLoanVal) retLoanVal.value = '';
          if (retBtn) retBtn.disabled = true;
          disableReturnFields();
          showToast(missLabel, true);
          return;
        }
      }

      const overlay = document.getElementById('cam-overlay');
      overlay.classList.add('open');
      const statusEl = document.getElementById('cam-status');
      const dot = document.getElementById('cam-dot');
      statusEl.textContent = 'カメラを起動しています...';
      statusEl.className = 'cam-status';
      dot.className = 'cam-dot';

      try {
        const video = document.getElementById('cam-video');
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = cameraStream;
        await video.play().catch(() => { });

        codeReader = new ZXingBrowser.BrowserMultiFormatReader();
        statusEl.textContent = 'コードをカメラに向けてください';
        dot.className = 'cam-dot active';
        scanning = true;

        codeReader.decodeFromVideoElement(video, (result, err) => {
          if (!scanning) return;
          if (result) {
            const text = result.getText().trim();
            if (text === lastScanned) return;
            lastScanned = text;
            handleScanResult(text);
          }
        });
      } catch (e) {
        statusEl.textContent = e.name === 'NotAllowedError'
          ? 'カメラの使用が拒否されています（ブラウザ設定を確認）'
          : 'カメラエラー: ' + e.message;
        statusEl.className = 'cam-status err';
      }
    }

    function handleScanResult(scanned) {
      const statusEl = document.getElementById('cam-status');
      const dot = document.getElementById('cam-dot');
      const currentReturnType = cameraTargetId === 'ret' ? getCurrentReturnType() : null;
      const candidates = cameraTargetId === 'lend' ? lendScanCandidates
        : cameraTargetId === 'sp-lend' ? spLendScanCandidates
          : getReturnCandidatesByType(currentReturnType);

      const candidate = candidates.find(c => {
        if (c.no === '' || c.no !== scanned) return false;
        if (cameraTargetId === 'lend' && (c.status === 'broken' || c.status === 'retired')) return false;
        if (cameraTargetId === 'ret' && c.status === 'broken') return false;
        return true;
      });

      const detectedEl = document.getElementById(
        cameraTargetId === 'lend' ? 'lend-detected'
          : cameraTargetId === 'sp-lend' ? 'sp-lend-detected'
            : 'ret-detected'
      );
      let autoSwitchedReturnType = false;

      if (candidate) {
        scanning = false;
        if (codeReader) { try { codeReader.reset(); } catch { } codeReader = null; }

        const hiddenInput = document.getElementById(
          cameraTargetId === 'lend' ? 'lend-device-val'
            : cameraTargetId === 'sp-lend' ? 'sp-lend-loan-val'
              : 'ret-loan-val'
        );
        if (hiddenInput) hiddenInput.value = candidate.value;

        if (detectedEl) {
          detectedEl.textContent = `${candidate.no}`;
          detectedEl.className = 'device-detected found';
        }

        statusEl.textContent = `✔︎ No ${candidate.no} を検知しました`;
        statusEl.className = 'cam-status found';
        dot.className = 'cam-dot';
        showToast(`No ${candidate.no} を検知しました`);

        if (cameraTargetId === 'lend') {
          if (candidate.status === 'broken' || candidate.status === 'retired') {
            detectedEl.className = 'device-detected miss';
            statusEl.textContent = candidate.status === 'retired' ? '❌ この端末は廃却済みです' : '❌ この端末は故障中です';
            statusEl.className = 'cam-status err';
            const hiddenInput = document.getElementById('lend-device-val');
            if (hiddenInput) hiddenInput.value = '';
            isBrokenDeviceDetected = true;
            const guideEl = document.getElementById('mgmt-guide-text');
            if (guideEl) {
              guideEl.textContent = candidate.status === 'retired'
                ? '❌ 廃却済み端末です。別の端末を読み取りください。'
                : '❌ 故障中の端末です。別の端末を読み取りください。';
              guideEl.style.color = '#f87171';
            }
            updateManagementGuide();
          } else if (candidate.is_lending) {
            detectedEl.className = 'device-detected miss';
            detectedEl.textContent = `No ${candidate.no} は既に貸出中の端末です。別の端末を読み取りください。`;
            statusEl.textContent = `❌ No ${candidate.no} は既に貸出中の端末です。別の端末を読み取りください。`;
            statusEl.className = 'cam-status err';
            const hiddenInput = document.getElementById('lend-device-val');
            if (hiddenInput) hiddenInput.value = '';
            isBrokenDeviceDetected = false;
            updateManagementGuide();
          } else {
            isBrokenDeviceDetected = false;
            const guideEl = document.getElementById('mgmt-guide-text');
            if (guideEl) guideEl.style.color = '';
            updateManagementGuide();
          }
        } else if (cameraTargetId === 'sp-lend') {
          updateSpLendBtn();
          setTimeout(() => closeCamera(), 900);
        } else if (cameraTargetId === 'ret') {
          setReturnSelection(currentReturnType, candidate.value);
          applyReturnSelection(currentReturnType);
          initReturnTypeSelector(candidate);
          applyReturnIssueConstraint();
        }
        setTimeout(() => closeCamera(), 900);
      } else {
        let missLabel;
        let missStatus;
        if (cameraTargetId === 'ret') {
          if (currentReturnType === 'smartphone_only') {
            missLabel = `No ${scanned} に該当するスマホはありません。`;
            missStatus = `No ${scanned} は登録されていません`;
          } else if (currentReturnType === 'dock_and_cable_only') {
            missLabel = `No ${scanned} に該当する台座・コードはありません。`;
            missStatus = `No ${scanned} は登録されていません`;
          } else {
            missLabel = `No ${scanned} に該当する端末はありません。`;
            missStatus = `No ${scanned} は登録されていません`;
          }
        } else if (cameraTargetId === 'sp-lend') {
          missLabel = `No ${scanned} に該当するスマホはありません。`;
          missStatus = `No ${scanned} は登録されていません`;
        } else {
          missLabel = `No ${scanned} に該当する端末はありません。`;
          missStatus = `No ${scanned} は登録されていません`;
        }

        if (cameraTargetId === 'sp-lend') {
          const allLoans = window.mgmtAllLoans || [];
          const lendingLoans = allLoans.filter(isLoanActive);
          const matchedLoan = lendingLoans.find(l => (l.device?.no || '').toString().trim() === scanned);

          if (matchedLoan) {
            if (matchedLoan.is_smartphone_out) {
              missLabel = `No ${scanned} は既に貸出中の端末です。別の端末を読み取りください。`;
              missStatus = `No ${scanned} は既に貸出中の端末です。別の端末を読み取りください。`;
            } else if (!matchedLoan.is_dock_out && !matchedLoan.is_cable_out) {
              missLabel = `No ${scanned} の台座・コードは未貸出です。`;
              missStatus = `No ${scanned} は台座・コード貸出中ではないため対象外です`;
            }
          } else {
            const deviceExists = lendScanCandidates.some(c => c.no !== '' && c.no === scanned);
            if (deviceExists) {
              const isBroken = lendScanCandidates.some(c => c.no !== '' && c.no === scanned && c.status === 'broken');
              if (isBroken) {
                missLabel = `No ${scanned} に該当するスマホはありません。`;
                missStatus = `No ${scanned} は登録されていません`;
              } else {
                missLabel = `No ${scanned} はスマホ単体貸出です。端末一式を貸出してください。`;
                missStatus = `No ${scanned} はスマホ単体貸出です。端末一式を貸出してください`;
              }
            }
          }
        } else if (cameraTargetId === 'ret') {
          setReturnSelection(currentReturnType, null);
          const brokenDeviceExists = lendScanCandidates.some(c => c.no !== '' && c.no === scanned && c.status === 'broken');
          if (brokenDeviceExists) {
            if (currentReturnType === 'smartphone_only') {
              missLabel = `No ${scanned} に該当するスマホはありません。`;
              missStatus = `No ${scanned} は登録されていません`;
            } else if (currentReturnType === 'dock_and_cable_only') {
              missLabel = `No ${scanned} に該当する台座・コードはありません。`;
              missStatus = `No ${scanned} は登録されていません`;
            } else {
              missLabel = `No ${scanned} に該当する端末はありません。`;
              missStatus = `No ${scanned} は登録されていません`;
            }
          } else {
            if (candidates.length === 0) {
              if (currentReturnType === 'full_set') {
                missLabel = `該当する端末はありません。`;
                missStatus = `端末一式返却の対象となる貸出中の端末がありません`;
              } else if (currentReturnType === 'smartphone_only') {
                missLabel = `該当するスマホはありません。`;
                missStatus = `スマホ返却の対象となるスマホ貸出中の端末がありません`;
              } else if (currentReturnType === 'dock_and_cable_only') {
                missLabel = `該当する台座・コードはありません。`;
                missStatus = `台座・コード返却の対象となる端末がありません`;
              }
            }
            const deviceExists = lendScanCandidates.some(c => c.no !== '' && c.no === scanned);
            if (!deviceExists) {
              if (currentReturnType === 'smartphone_only') {
                missLabel = `No ${scanned} に該当するスマホはありません。`;
                missStatus = `No ${scanned} は登録されていません`;
              } else if (currentReturnType === 'dock_and_cable_only') {
                missLabel = `No ${scanned} に該当する台座・コードはありません。`;
                missStatus = `No ${scanned} は登録されていません`;
              } else {
                missLabel = `No ${scanned} に該当する端末はありません。`;
                missStatus = `No ${scanned} は登録されていません`;
              }
            } else {
              if (currentReturnType === 'smartphone_only') {
                missLabel = `No ${scanned} は貸出されていません。`;
                missStatus = `No ${scanned} は現在貸出されていません`;
              } else if (currentReturnType === 'dock_and_cable_only') {
                missLabel = `No ${scanned} は貸出されていません。`;
                missStatus = `No ${scanned} は現在貸出されていません`;
              } else {
                missLabel = `No ${scanned} は貸出されていません。`;
                missStatus = `No ${scanned} は現在貸出されていません`;
              }
            }
            const matchedLoan = returnScanCandidates.find(c => c.no !== '' && c.no === scanned);
            if (matchedLoan) {
              if (currentReturnType === 'smartphone_only') {
                if (!matchedLoan.is_smartphone_out) {
                  missLabel = `No ${scanned} は返却済みのスマホです。`;
                  missStatus = `No ${scanned} は返却済みのスマホです`;
                }
              } else if (currentReturnType === 'dock_and_cable_only') {
                if (matchedLoan.is_smartphone_out) {
                  missLabel = `No ${scanned} はスマホ未返却です。`;
                  missStatus = `No ${scanned} はスマホ未返却です`;
                } else if (!matchedLoan.is_dock_out && !matchedLoan.is_cable_out) {
                  missLabel = `No ${scanned} は返却対象外の台座・コードです。`;
                  missStatus = `No ${scanned} は台座・コード返却の対象外です`;
                }
              } else if (currentReturnType === 'full_set') {
                if (!matchedLoan.is_smartphone_out) {
                  if (matchedLoan.is_dock_out || matchedLoan.is_cable_out) {
                    setReturnSelection('dock_and_cable_only', matchedLoan.value);
                    setReturnType('dock_and_cable_only');
                    initReturnTypeSelector(matchedLoan, true);
                    applyReturnIssueConstraint();
                    autoSwitchedReturnType = true;
                    missLabel = `${matchedLoan.no}`;
                    missStatus = `✔︎ No ${scanned} を検知しました（台座・コード返却に切り替えました）`;
                    showToast('スマホ返却済みのため、台座・コード返却に切り替えました');
                  } else {
                    missLabel = '対象外：スマホは返却済み。台座・コード返却から返却してください。';
                    missStatus = `No ${scanned} は端末一式返却の対象外です`;
                  }
                } else if (!matchedLoan.is_dock_out && !matchedLoan.is_cable_out) {
                  missLabel = `対象外： ${scanned} （台座/コード返却済み）`;
                  missStatus = `No ${scanned}は端末一式返却の対象外です`;
                }
              }
            }
          }
        }

        if (autoSwitchedReturnType) {
          if (detectedEl) {
            detectedEl.textContent = missLabel;
            detectedEl.className = 'device-detected found';
          }
          statusEl.textContent = missStatus;
          statusEl.className = 'cam-status found';
          dot.className = 'cam-dot';
          setTimeout(() => closeCamera(), 900);
          return;
        }

        if (detectedEl) {
          detectedEl.textContent = missLabel;
          detectedEl.className = 'device-detected miss';
        }
        statusEl.textContent = missStatus;
        statusEl.className = 'cam-status err';
        if (cameraTargetId === 'lend') {
          updateManagementGuide();
          setTimeout(() => closeCamera(), 900);
        }
        if (cameraTargetId === 'sp-lend') {
          const spLoanVal = document.getElementById('sp-lend-loan-val');
          if (spLoanVal) spLoanVal.value = '';
          updateSpLendBtn();
          setTimeout(() => closeCamera(), 900);
        }
        if (cameraTargetId === 'ret') {
          const retLoanVal = document.getElementById('ret-loan-val');
          if (retLoanVal) retLoanVal.value = '';
          const retBtn = document.getElementById('ret-btn');
          if (retBtn) retBtn.disabled = true;
          disableReturnFields();
          setTimeout(() => closeCamera(), 900);
        }
      }
    }

    function closeCamera() {
      document.getElementById('cam-overlay').classList.remove('open');
      scanning = false;
      if (codeReader) { try { codeReader.reset(); } catch { } codeReader = null; }
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      const video = document.getElementById('cam-video');
      if (video) video.srcObject = null;
      lastScanned = null;
      cameraTargetId = null;
    }

    window.addEventListener('keydown', e => { if (e.key === 'Escape') closeCamera(); });

    async function apiFetch(path, options = {}) {
      const res = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...options });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || res.statusText);
      }
      if (res.status === 204) return null;
      return res.json();
    }

    function showToast(msg, error = false) {
      const t = document.getElementById('toast');
      t.className = 'toast' + (error ? ' error' : '');
      t.innerHTML = `<svg width="14" viewBox="0 0 14 14" fill="none"><path d="${error ? 'M2 2l10 10M12 2L2 12' : 'M2 7l3.5 3.5L12 3'}" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>${msg}`;
      t.classList.add('show');
      const duration = msg.includes('既に貸出中') ? 5000 : 3500;
      setTimeout(() => t.classList.remove('show'), duration);
    }

    function validateEmployeeCode(code) {
      return /^[0-9]{7}$/.test(code) || /^[SZ][0-9]{6}$/.test(code);
    }
    function normalizeEmployeeCode(code) { return code.toUpperCase(); }

    function fmt(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0')
        + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0');
    }

    function isPhoneOut(loan) { return !!loan.is_smartphone_out; }
    function isDockOut(loan) { return !!loan.is_dock_out; }
    function isCableOut(loan) { return !!loan.is_cable_out; }
    function isLoanActive(loan) { return isPhoneOut(loan) || isDockOut(loan) || isCableOut(loan); }

    function loanStatusText(loan) {
      if (!isLoanActive(loan)) return '返却済み';
      if (isPhoneOut(loan) && (isDockOut(loan) || isCableOut(loan))) return '端末+台座貸出中';
      if (!isPhoneOut(loan) && (isDockOut(loan) || isCableOut(loan))) return '台座のみ貸出中';
      if (isPhoneOut(loan) && !isDockOut(loan) && !isCableOut(loan)) return 'スマホのみ貸出中';
      return '貸出中';
    }

    function loanStatusClass(loan) {
      return isLoanActive(loan) ? 'status-lending' : 'status-returned';
    }

    async function updateHeader() {
      try {
        const loans = await apiFetch('/loans?status=lending&limit=500');
        document.getElementById('live-count').textContent = loans.length;
      } catch { }
    }

    function showTab(tab) {
      closeCamera();
      closeAdminMenuAndAuth();

      if (['dashboard', 'log', 'devices'].includes(tab)) {
        if (!isAdmin) {
          showAdminAuth();
          return;
        }
      }

      const main = document.getElementById('main-content');
      if (tab === 'management') renderManagement(main);
      else if (tab === 'dashboard') renderDashboard(main);
      else if (tab === 'log') renderLog(main);
      else if (tab === 'devices') renderDevices(main);
    }

    function camBtn(targetId, label = '読み取り', withIcon = true) {
      return `<button class="btn-camera" type="button" id="${targetId}-cam-btn" onclick="openCamera('${targetId}')" title="カメラで読み取り">
		${withIcon ? '<svg viewBox="0 0 16 16" fill="none"><path d="M1 5.5V4a1 1 0 011-1h2l1-1.5h6L12 3h2a1 1 0 011 1v8.5a1 1 0 01-1 1H2a1 1 0 01-1-1V5.5z" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2.5" stroke="currentColor" stroke-width="1.2"/></svg>' : ''}
		${label}
	</button>`;
    }

    function toggleAdminMenu() {
      const menu = document.getElementById('admin-menu');
      if (menu.classList.contains('open')) {
        menu.classList.remove('open');
      } else {
        if (!isAdmin) {
          showAdminAuth();
        } else {
          menu.classList.add('open');
        }
      }
    }

    function closeAdminMenuAndAuth() {
      document.getElementById('admin-menu').classList.remove('open');
      document.getElementById('admin-overlay').classList.remove('open');
    }

    function showAdminAuth() {
      document.getElementById('admin-overlay').classList.add('open');
      document.getElementById('admin-password').value = '';
      document.getElementById('admin-error').textContent = '';
      setTimeout(() => document.getElementById('admin-password').focus(), 100);
    }

    function closeAdminAuth() {
      document.getElementById('admin-overlay').classList.remove('open');
      document.getElementById('admin-password').value = '';
      document.getElementById('admin-error').textContent = '';
    }

    function submitAdminAuth() {
      const password = document.getElementById('admin-password')?.value;
      const errorEl = document.getElementById('admin-error');

      if (!password) {
        errorEl.textContent = 'パスワードを入力してください';
        return;
      }

      apiFetch('/admin/auth', {
        method: 'POST',
        body: JSON.stringify({ password: password })
      }).then(res => {
        if (res.success) {
          isAdmin = true;
          document.getElementById('admin-overlay').classList.remove('open');
          document.getElementById('admin-menu').classList.add('open');
          showToast('管理者として認証されました');
        } else {
          errorEl.textContent = 'パスワードが正しくありません';
          document.getElementById('admin-password').select();
        }
      }).catch(e => {
        errorEl.textContent = '認証エラー: ' + e.message;
      });
    }

    function logoutAdmin() {
      isAdmin = false;
      document.getElementById('admin-menu').classList.remove('open');
      showTab('management');
      showToast('ログアウトしました');
    }

    async function renderDashboard(el) {

  <div class="panel" id="dash-broken-panel"><div class="panel-header"><div class="panel-title">故障・廃却端末</div></div><div class="empty">読み込み中...</div></div>`;

            : `<table><thead><tr><th>No</th><th>ID</th><th>ステータス</th><th>従業員コード</th><th>貸出日時</th></tr></thead><tbody>${lendingLoans.map(l => `<tr>
          <td style="font-family:var(--mono);font-size:12px;color:var(--text)">${l.device.no || '-'}</td>
          <td><span class="device-id">${l.device.device_id_code}</span></td>
          <td><span class="status-pill ${loanStatusClass(l)}">${loanStatusText(l)}</span></td>
          <td style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${l.user_employee_id || '-'}</td>
          <td class="time-cell">${fmt(l.lent_at)}</td>
        </tr>`).join('')
            }</tbody></table>`
          }</div>`;

    function updateManagementGuide() {

        if (codeHelpEl) {
          codeHelpEl.textContent = '7桁の従業員コードを入力してください';
          codeHelpEl.className = 'field-help';
        }
      } else if (!validCode) {
        guideEl.textContent = '従業員コードは7桁数字または S/Z + 6桁で入力してください。';
        if (codeHelpEl) {
          codeHelpEl.textContent = '7桁数字、または S/Z + 6桁で入力してください。';
          codeHelpEl.className = 'field-help warn';

        guideEl.textContent = defaultGuideText;
        if (codeHelpEl) {
          codeHelpEl.textContent = '従業員コードを確認しました。';
          codeHelpEl.className = 'field-help ok';
        }
      }

      if (lendRuleConfirm) {
        lendRuleConfirm.disabled = !hasDevice;
        if (!hasDevice) lendRuleConfirm.checked = false;
      }
      if (lendBtn) {
        lendBtn.disabled = !(validCode && hasDevice && ruleConfirmed);
      }
      if (lendCamBtn) {
        lendCamBtn.disabled = !validCode;
      }
    }

    async function onMgmtEmployeeCodeInput() {
      const rawCode = document.getElementById('mgmt-employee-code')?.value.trim() || '';
      const code = normalizeEmployeeCode(rawCode);

      currentEmployeeCode = '';
      currentEmployeeLoans = [];
      isBrokenDeviceDetected = false;

      const lendDetected = document.getElementById('lend-detected');
      const lendDeviceVal = document.getElementById('lend-device-val');
      if (lendDetected) {
        lendDetected.textContent = '未検出';
        lendDetected.className = 'device-detected';
      }
      if (lendDeviceVal) lendDeviceVal.value = '';

      const spDetected = document.getElementById('sp-lend-detected');
      const spLoanVal = document.getElementById('sp-lend-loan-val');
      const spDockConfirm = document.getElementById('sp-lend-dock-confirm');
      const spRuleConfirm = document.getElementById('sp-lend-rule-confirm');
      const lendRuleConfirm = document.getElementById('lend-rule-confirm');
      if (spDetected) {
        spDetected.textContent = '未検出';
        spDetected.className = 'device-detected';
      }
      if (spLoanVal) spLoanVal.value = '';
      if (spDockConfirm) spDockConfirm.checked = false;
      if (spRuleConfirm) spRuleConfirm.checked = false;
      if (lendRuleConfirm) lendRuleConfirm.checked = false;
      updateSpLendBtn();
      setLendMode('full_set');

      const lendBtn = document.getElementById('lend-btn');
      const lendForm = document.getElementById('mgmt-new-lend-form');
      const returnContainer = document.getElementById('mgmt-return-container');
      if (lendBtn) lendBtn.disabled = true;
      if (lendForm) lendForm.style.display = 'none';
      if (returnContainer) returnContainer.style.display = 'none';

      const existingContainer = document.getElementById('existing-loans-container');
      const returnPanel = document.getElementById('mgmt-ret-panel');
      if (existingContainer) existingContainer.style.display = 'none';
      updateManagementGuide();

      if (!validateEmployeeCode(code)) {
        if (existingContainer) existingContainer.innerHTML = '<div class="existing-loans-empty">有効な従業員コードを入力してください</div>';
        if (returnPanel) returnPanel.innerHTML = '<div class="panel-header"><div class="panel-title">返却処理</div></div><div class="empty">従業員コードを入力してください</div>';
        updateManagementGuide();
        return;
      }

      currentEmployeeCode = code;

      try {
        const loans = await apiFetch('/loans?status=lending&limit=200&q=' + encodeURIComponent(code));
        currentEmployeeLoans = loans.filter(l => {
          const borrowerIds = Array.isArray(l.borrower_employee_ids) ? l.borrower_employee_ids : [];
          if (borrowerIds.length > 0) {
            return borrowerIds.map(v => (v || '').toUpperCase()).includes(code);
          }
          const isDockBorrower = (l.user_employee_id || '').toUpperCase() === code;
          const activeSpLoan = (l.smartphone_loans || []).find(sl => !sl.returned_at);
          const isSmartphoneBorrower = activeSpLoan && activeSpLoan.user_employee_id.toUpperCase() === code;
          return isDockBorrower || isSmartphoneBorrower;
        });

        renderExistingLoansList(currentEmployeeLoans);

        const allLendingLoans = (window.mgmtAllLoans || []).filter(isLoanActive);
        renderReturnPanel(allLendingLoans);
        initReturnTypeSelector(null);
        disableReturnFields();

        const hasExistingLoans = currentEmployeeLoans.length > 0;

        if (existingContainer) existingContainer.style.display = hasExistingLoans ? '' : 'none';
        if (lendForm) lendForm.style.display = '';
        if (returnContainer) returnContainer.style.display = '';
        if (lendBtn) lendBtn.disabled = false;
        updateManagementGuide();
      } catch (e) {
        if (lendForm) lendForm.style.display = '';
        if (existingContainer) existingContainer.style.display = '';
        if (returnContainer) returnContainer.style.display = '';
        if (existingContainer) existingContainer.innerHTML = `<div class="existing-loans-empty">読み込みエラー: ${e.message}</div>`;
        if (returnPanel) returnPanel.innerHTML = `<div class="panel-header"><div class="panel-title">返却処理</div></div><div class="error-msg">${e.message}</div>`;
        updateManagementGuide();
      }
    }

    async function handleLendPrimaryAction() {
      const lendBtn = document.getElementById('lend-btn');
      if (lendBtn?.disabled) return;

      const code = currentEmployeeCode;
      const deviceId = parseInt(document.getElementById('lend-device-val')?.value);

      if (!validateEmployeeCode(code)) {
        showToast('従業員コードを入力してください', true);
        return;
      }

      if (!deviceId) {
        await openCamera('lend');
        return;
      }

      const candidate = lendScanCandidates.find(c => c.value == deviceId);
      if (candidate && (candidate.status === 'broken' || candidate.status === 'retired')) {
        showToast(candidate.status === 'retired' ? '廃却済み端末です。別の端末を読み取りください。' : '故障中の端末です。別の端末を読み取りください。', true);
        return;
      }

      await submitLendMgmt();
    }

        showToast('従業員コードを入力してください', true);

        detectedEl.className = 'device-detected';

      isBrokenDeviceDetected = false;
      updateManagementGuide();
      await openCamera('lend');

        <button class="btn-primary" id="ret-btn" onclick="submitReturnMgmt()" disabled>返却完了</button>

    function toggleReturnIssueNote() {
      const hasIssue = document.getElementById('ret-issue-abnormal')?.checked === true;
      const maintainNote = document.getElementById('ret-maint-note');
      if (!hasIssue && maintainNote) maintainNote.style.display = 'none';
      updateReturnIssueDependentVisibility();
      applyReturnIssueConstraint();
    }

    function updateReturnIssueDependentVisibility() {
      const hasIssue = document.getElementById('ret-issue-abnormal')?.checked === true;
      const returnType = document.getElementById('ret-return-type')?.value || 'full_set';
      const noteWrap = document.getElementById('ret-note-wrap');
      const noteInput = document.getElementById('ret-note');
      const retBtn = document.getElementById('ret-btn');
      const hideForSmartphoneIssue = hasIssue && returnType === 'smartphone_only';

      if (noteWrap) {
        noteWrap.style.display = hasIssue && !hideForSmartphoneIssue ? '' : 'none';
      }
      if (noteInput && (!hasIssue || hideForSmartphoneIssue)) {
        noteInput.value = '';
      }
      if (retBtn) {
        retBtn.style.display = hideForSmartphoneIssue ? 'none' : '';
      }
    }

    function applyReturnIssueConstraint() {
      const hasIssue = document.getElementById('ret-issue-abnormal')?.checked === true;
      const btnSmartphone = document.getElementById('ret-type-smartphone');
      const btnDockCable = document.getElementById('ret-type-dock-cable');
      const btnFullSet = document.getElementById('ret-type-full-set');
      const maintainNote = document.getElementById('ret-maint-note');
      const loanId = parseInt(document.getElementById('ret-loan-val')?.value);
      const selected = returnScanCandidates.find(c => c.value === loanId);
      if (!btnSmartphone || !btnDockCable || !btnFullSet || !maintainNote || !selected) return;

      const phoneOut = !!selected.is_smartphone_out;
      const dockOut = !!selected.is_dock_out;
      const cableOut = !!selected.is_cable_out;

      if (hasIssue) {
        btnSmartphone.disabled = true;
        btnDockCable.disabled = true;
        btnFullSet.disabled = true;
        if (!phoneOut && (dockOut || cableOut)) {
          btnDockCable.disabled = false;
          setReturnType('dock_and_cable_only');
          maintainNote.textContent = '異常対応のため、台座・コード返却してください。';
        } else {
          btnSmartphone.disabled = false;
          btnFullSet.disabled = false;
          setReturnType('full_set');
          maintainNote.textContent = '異常対応のため、端末一式返却してください。';
        }
        maintainNote.style.display = 'block';
        switchReturnSourceByType(document.getElementById('ret-return-type')?.value || 'full_set');
        return;
      }

      maintainNote.textContent = 'メンテナンスのため、端末一式返却してください。';
      maintainNote.style.display = 'none';
      initReturnTypeSelector(selected, true);
    }

    function updateReturnSubmitState() {
      const btn = document.getElementById('ret-btn');
      if (!btn) return;
      const hasIssue = document.getElementById('ret-issue-abnormal')?.checked === true;
      const returnType = document.getElementById('ret-return-type')?.value || 'full_set';

      if (hasIssue && returnType === 'smartphone_only') {
        btn.disabled = true;
        return;
      }

      const hasCode = validateEmployeeCode(normalizeEmployeeCode(currentEmployeeCode || ''));
      if (!hasCode) {
        btn.disabled = true;
        return;
      }

      const loanId = parseInt(document.getElementById('ret-loan-val')?.value);
      if (!loanId) {
        btn.disabled = true;
        return;
      }

      const selected = returnScanCandidates.find(c => c.value === loanId);
      if (!selected) {
        btn.disabled = true;
        return;
      }

      const cableChecked = !!document.getElementById('ret-cable-check')?.checked;
      const needsCableCheck = returnType !== 'smartphone_only' && !!selected.is_cable_out;
      btn.disabled = needsCableCheck && !cableChecked;
    }

    function setReturnType(type) {
      const hidden = document.getElementById('ret-return-type');
      const btnSmartphone = document.getElementById('ret-type-smartphone');
      const btnDockCable = document.getElementById('ret-type-dock-cable');
      const btnFullSet = document.getElementById('ret-type-full-set');
      const summary = document.getElementById('ret-summary');
      const cableWrap = document.getElementById('ret-cable-wrap');
      if (!hidden || !btnSmartphone || !btnDockCable || !btnFullSet || !summary || !cableWrap) return;

      hidden.value = type;
      btnSmartphone.classList.toggle('active', type === 'smartphone_only');
      btnDockCable.classList.toggle('active', type === 'dock_and_cable_only');
      btnFullSet.classList.toggle('active', type === 'full_set');
      cableWrap.style.display = type === 'smartphone_only' ? 'none' : 'flex';

      if (type === 'smartphone_only') {
        summary.textContent = '返却内容: スマホ';
      } else if (type === 'dock_and_cable_only') {
        summary.textContent = '返却内容: 台座・コード';
      } else {
        summary.textContent = '返却内容: スマホ・台座・コード';
      }

      applyReturnSelection(type);
      switchReturnSourceByType(type);
      applyReturnSelection(type);
      updateReturnIssueDependentVisibility();
      updateReturnSubmitState();
    }

    function initReturnTypeSelector(loan, keepCurrentType = false) {
      const btnSmartphone = document.getElementById('ret-type-smartphone');
      const btnDockCable = document.getElementById('ret-type-dock-cable');
      const btnFullSet = document.getElementById('ret-type-full-set');
      const retBtn = document.getElementById('ret-btn');
      if (!btnSmartphone || !btnDockCable || !btnFullSet || !retBtn) return;

      const phoneOut = !!loan?.is_smartphone_out;
      const dockOut = !!loan?.is_dock_out;
      const cableOut = !!loan?.is_cable_out;

      const hasDockCableOnly = returnScanCandidates.some(c => !c.is_smartphone_out && (c.is_dock_out || c.is_cable_out));
      const hasSmartphoneOut = returnScanCandidates.some(c => c.is_smartphone_out);
      const hasFullSet = returnScanCandidates.some(c => c.is_smartphone_out && (c.is_dock_out || c.is_cable_out));

      btnSmartphone.disabled = false;
      btnDockCable.disabled = false;
      btnFullSet.disabled = false;
      retBtn.disabled = !loan;

      if (!loan) {
        btnDockCable.disabled = !hasDockCableOnly;
        btnSmartphone.disabled = !hasSmartphoneOut;
        btnFullSet.disabled = !hasFullSet;

        if (keepCurrentType) {
          const current = document.getElementById('ret-return-type')?.value || 'full_set';
          const currentBtn = current === 'full_set' ? btnFullSet
            : current === 'smartphone_only' ? btnSmartphone
              : btnDockCable;
          if (!currentBtn.disabled) {
            setReturnType(current);
          } else if (hasFullSet) {
            setReturnType('full_set');
          } else if (hasSmartphoneOut) {
            setReturnType('smartphone_only');
          } else if (hasDockCableOnly) {
            setReturnType('dock_and_cable_only');
          }
        } else if (hasFullSet) {
          setReturnType('full_set');
        } else if (hasSmartphoneOut) {
          setReturnType('smartphone_only');
        } else if (hasDockCableOnly) {
          setReturnType('dock_and_cable_only');
        }
        updateReturnSubmitState();
        return;
      }

      const userSelectedType = document.getElementById('ret-return-type')?.value;
      const userHasSelected = btnSmartphone.classList.contains('active') ||
        btnDockCable.classList.contains('active') ||
        btnFullSet.classList.contains('active');

      if (userHasSelected && userSelectedType) {
        enableReturnFields();
        retBtn.disabled = false;

        btnDockCable.disabled = !hasDockCableOnly;
        btnSmartphone.disabled = !hasSmartphoneOut;
        btnFullSet.disabled = !hasFullSet;

        const selectedBtn = userSelectedType === 'full_set' ? btnFullSet
          : userSelectedType === 'smartphone_only' ? btnSmartphone
            : btnDockCable;
        const effectiveType = selectedBtn.disabled
          ? (hasFullSet ? 'full_set' : (hasSmartphoneOut ? 'smartphone_only' : 'dock_and_cable_only'))
          : userSelectedType;

        setReturnType(effectiveType);
        updateReturnSubmitState();
        return;
      }

      if (!phoneOut && (dockOut || cableOut)) {
        enableReturnFields();
        btnDockCable.disabled = !hasDockCableOnly;
        btnSmartphone.disabled = !hasSmartphoneOut;
        btnFullSet.disabled = !hasFullSet;
        setReturnType('dock_and_cable_only');
        updateReturnSubmitState();
        return;
      }
      if (phoneOut && !dockOut && !cableOut) {
        enableReturnFields();
        btnDockCable.disabled = !hasDockCableOnly;
        btnSmartphone.disabled = !hasSmartphoneOut;
        btnFullSet.disabled = !hasFullSet;
        setReturnType('smartphone_only');
        updateReturnSubmitState();
        return;
      }
      enableReturnFields();
      btnDockCable.disabled = !hasDockCableOnly;
      btnSmartphone.disabled = !hasSmartphoneOut;
      btnFullSet.disabled = !hasFullSet;
      setReturnType('full_set');
      updateReturnSubmitState();
    }

    function populateDockCableLoanSelect() {
      const select = document.getElementById('ret-dock-loan-select');
      if (!select) return;

      const dockCableLoans = returnScanCandidates.filter(c => !c.is_smartphone_out && (c.is_dock_out || c.is_cable_out));
      const options = ['<option value="">選択してください</option>'].concat(
        dockCableLoans.map(c => `<option value="${c.value}">${c.no || '-'} / ${c.device_id_code || '-'}</option>`)
      );
      select.innerHTML = options.join('');

      const selectedLoanId = parseInt(document.getElementById('ret-loan-val')?.value);
      const selectedLoan = dockCableLoans.find(c => c.value === selectedLoanId);
      if (selectedLoan) {
        select.value = String(selectedLoanId);
      } else {
        select.value = '';
      }

    function switchReturnSourceByType(type) {
      const sourceQr = document.getElementById('ret-source-qr');
      const sourceLabel = document.getElementById('ret-source-label');
      const retBtn = document.getElementById('ret-btn');
      const hidden = document.getElementById('ret-loan-val');
      if (!sourceQr || !sourceLabel || !retBtn || !hidden) return;

      if (type === 'dock_and_cable_only') {
        sourceLabel.textContent = '端末（スマホ返却済み）';
        sourceQr.style.display = '';

        const selectedLoanId = parseInt(hidden.value);
        const validLoan = returnScanCandidates.find(c => c.value === selectedLoanId && !c.is_smartphone_out && (c.is_dock_out || c.is_cable_out));
        if (!validLoan) {
          hidden.value = '';
          setReturnSelection(type, null);
          retBtn.disabled = true;
          disableReturnFields();
        } else {
          setReturnSelection(type, validLoan.value);
          retBtn.disabled = false;
          enableReturnFields();
        }
        updateReturnSubmitState();
        return;
      }

      if (type === 'smartphone_only') {
        sourceLabel.textContent = '端末（スマホ貸出中）';
        sourceQr.style.display = '';

        const selectedLoanId = parseInt(hidden.value);
        const validLoan = returnScanCandidates.find(c => c.value === selectedLoanId && c.is_smartphone_out);
        if (!validLoan) {
          hidden.value = '';
          setReturnSelection(type, null);
          retBtn.disabled = true;
          disableReturnFields();
        } else {
          setReturnSelection(type, validLoan.value);
          retBtn.disabled = false;
          enableReturnFields();
        }
        updateReturnSubmitState();
        return;
      }

      sourceLabel.textContent = '端末（貸出中）';
      sourceQr.style.display = '';
      const selectedLoanId = parseInt(hidden.value);
      const validLoan = returnScanCandidates.find(c => c.value === selectedLoanId && c.is_smartphone_out && (c.is_dock_out || c.is_cable_out));
      if (!validLoan) {
        hidden.value = '';
        setReturnSelection(type, null);
        retBtn.disabled = true;
        disableReturnFields();
      } else {
        setReturnSelection(type, validLoan.value);
        retBtn.disabled = false;
        enableReturnFields();
      }
      updateReturnSubmitState();
    }

    function selectDockCableLoanFromList() {
      const select = document.getElementById('ret-dock-loan-select');
      const hidden = document.getElementById('ret-loan-val');
      const retBtn = document.getElementById('ret-btn');
      if (!select || !hidden || !retBtn) return;

      const loanId = parseInt(select.value);
      if (!loanId) {
        hidden.value = '';
        retBtn.disabled = true;
        disableReturnFields();
        updateReturnSubmitState();
        return;
      }

      const selected = returnScanCandidates.find(c => c.value === loanId && !c.is_smartphone_out && (c.is_dock_out || c.is_cable_out));
      if (!selected) {
        hidden.value = '';
        retBtn.disabled = true;
        disableReturnFields();
        updateReturnSubmitState();
        return;
      }

      hidden.value = String(loanId);
      retBtn.disabled = false;
      enableReturnFields();
      updateReturnSubmitState();
    }

      const issueAbnormal = document.getElementById('ret-issue-abnormal');

    async function submitLendMgmt() {
      const deviceId = parseInt(document.getElementById('lend-device-val')?.value);
      const code = currentEmployeeCode;
      const ruleConfirmed = !!document.getElementById('lend-rule-confirm')?.checked;

      if (!deviceId) { showToast('端末をカメラで読み取ってください', true); return; }
      if (!code) { showToast('従業員コードを入力してください', true); return; }
      if (!ruleConfirmed) { showToast('テストコースルールの遵守を確認してください', true); return; }

      const btn = document.getElementById('lend-btn');
      btn.disabled = true;
      try {
        const loan = await apiFetch('/loans', {
          method: 'POST',
          body: JSON.stringify({
            device_id: deviceId,
            user_employee_id: code,
            test_course_rule_confirmed: ruleConfirmed
          })
        });
        showToast(`${loan.device.device_id_code} を端末一式で貸出登録しました`);
        document.getElementById('lend-device-val').value = '';
        document.getElementById('lend-detected').textContent = '未検出';
        document.getElementById('lend-detected').className = 'device-detected';
        const spDetected = document.getElementById('sp-lend-detected');
        const spLoanVal = document.getElementById('sp-lend-loan-val');
        const spDockConfirm = document.getElementById('sp-lend-dock-confirm');
        const spRuleConfirm = document.getElementById('sp-lend-rule-confirm');
        const lendRuleConfirm = document.getElementById('lend-rule-confirm');
        if (spDetected) {
          spDetected.textContent = '未検出';
          spDetected.className = 'device-detected'
        }
        if (spLoanVal) spLoanVal.value = '';
        if (spDockConfirm) spDockConfirm.checked = false;
        if (spRuleConfirm) spRuleConfirm.checked = false;
        if (lendRuleConfirm) lendRuleConfirm.checked = false;
        updateSpLendBtn();
        isBrokenDeviceDetected = false;
        updateManagementGuide();
        updateHeader();
        await refreshManagementStats();
        resetMgmtEmployeeCode();
      } catch (e) { showToast(e.message, true); btn.disabled = false; }
    }

    function setLendMode(mode) {
      const fullBtn = document.getElementById('lend-mode-full-btn');
      const spBtn = document.getElementById('lend-mode-sp-btn');
      const fullArea = document.getElementById('lend-fullset-area');
      const spArea = document.getElementById('lend-sp-area');
      if (!fullBtn || !spBtn || !fullArea || !spArea) return;

      if (mode === 'full_set') {
        fullBtn.classList.add('active');
        spBtn.classList.remove('active');
        fullArea.style.display = '';
        spArea.style.display = 'none';
        updateManagementGuide();
      } else {
        fullBtn.classList.remove('active');
        spBtn.classList.add('active');
        fullArea.style.display = 'none';
        spArea.style.display = '';
        const allLoans = window.mgmtAllLoans || [];
        const lendingLoans = allLoans.filter(isLoanActive);
        spLendScanCandidates = lendingLoans
          .filter(l => !l.is_smartphone_out && (l.is_dock_out || l.is_cable_out))
          .map(l => ({
            value: l.id,
            no: (l.device?.no || '').toString().trim(),
            device_id_code: l.device?.device_id_code || '',
          }));
        updateSpLendBtn();
      }
    }

    function onSpLendCodeInput() {
      updateSpLendBtn();
    }

    function updateSpLendBtn() {
      const btn = document.getElementById('sp-lend-btn');
      if (!btn) return;
      const loanId = parseInt(document.getElementById('sp-lend-loan-val')?.value);
      const dockConfirmEl = document.getElementById('sp-lend-dock-confirm');
      const ruleConfirmEl = document.getElementById('sp-lend-rule-confirm');
      const canCheck = !!loanId;
      if (dockConfirmEl) {
        dockConfirmEl.disabled = !canCheck;
        if (!canCheck) dockConfirmEl.checked = false;
      }
      if (ruleConfirmEl) {
        ruleConfirmEl.disabled = !canCheck;
        if (!canCheck) ruleConfirmEl.checked = false;
      }
      const confirmed = !!dockConfirmEl?.checked;
      const ruleConfirmed = !!ruleConfirmEl?.checked;
      const hasCode = validateEmployeeCode(normalizeEmployeeCode(currentEmployeeCode || ''));
      btn.disabled = !(hasCode && loanId && confirmed && ruleConfirmed);
    }
