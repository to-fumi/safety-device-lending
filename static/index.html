    let lendLookupTimer = null;

    async function submitReturnMgmt() {
      const operatorCode = normalizeEmployeeCode(currentEmployeeCode || '');
      const loanId = parseInt(document.getElementById('ret-loan-val')?.value);
      const selectedReturnType = document.getElementById('ret-return-type')?.value;
      const cableChecked = !!document.getElementById('ret-cable-check')?.checked;
      const hasIssue = document.getElementById('ret-issue-abnormal')?.checked === true;
      const issueNote = document.getElementById('ret-note')?.value.trim();
      const btn = document.getElementById('ret-btn');

      if (!validateEmployeeCode(operatorCode)) {
        showToast('返却処理には従業員コードの入力が必要です', true);
        return;
      }

      if (!loanId) { showToast('返却端末を選択してください', true); return; }

      const selected = returnScanCandidates.find(c => c.value === loanId);
      const phoneOut = !!selected?.is_smartphone_out;
      const dockOut = !!selected?.is_dock_out;
      const cableOut = !!selected?.is_cable_out;

      let returnType = selectedReturnType || 'full_set';
      if (hasIssue) {
        returnType = (!phoneOut && (dockOut || cableOut)) ? 'dock_and_cable_only' : 'full_set';
      } else if (!phoneOut && (dockOut || cableOut)) {
        returnType = 'dock_and_cable_only';
      }

      if (hasIssue && !issueNote) {
        showToast('異常内容をメモに入力してください', true);
        return;
      }
      const note = hasIssue ? `異常あり：${issueNote}` : null;

      const needsCableCheck = returnType !== 'smartphone_only' && cableOut;
      if (needsCableCheck && !cableChecked) {
        showToast('コード重量（175g ± 5g）の確認チェックが必要です', true);
        return;
      }

      btn.disabled = true;
      try {
        const loan = await apiFetch(`/loans/${loanId}/return`, {
          method: 'PATCH',
          body: JSON.stringify({
            return_type: returnType,
            user_employee_id: operatorCode,
            cable_weight_checked: cableChecked,
            note: note || null
          })
        });
        if (loan.cable_weight_ok === false) {
          showToast(`${loan.device.device_id_code} を返却。コード重量確認が未チェックです`, true);
        } else {
          showToast(`${loan.device.device_id_code} の返却を記録しました`);
        }
        resetReturnSelections();
        document.getElementById('ret-loan-val').value = '';
        document.getElementById('ret-detected').textContent = '未検出';
        document.getElementById('ret-detected').className = 'device-detected';
        const lendDetected = document.getElementById('lend-detected');
        const lendDeviceVal = document.getElementById('lend-device-val');
        if (lendDetected) {
          lendDetected.textContent = '未検出';
          lendDetected.className = 'device-detected';
        }
        if (lendDeviceVal) lendDeviceVal.value = '';
        const spDetected = document.getElementById('sp-lend-detected');
        const spLoanVal = document.getElementById('sp-lend-loan-val');
        const spDockConfirm = document.getElementById('sp-lend-dock-confirm');
        if (spDetected) {
          spDetected.textContent = '未検出';
          spDetected.className = 'device-detected';
        }
        if (spLoanVal) spLoanVal.value = '';
        if (spDockConfirm) spDockConfirm.checked = false;
        updateSpLendBtn();
        setLendMode('full_set');
        document.getElementById('ret-return-type').value = 'full_set';
        document.getElementById('ret-issue-normal').checked = true;
        document.getElementById('ret-cable-check').checked = false;
        document.getElementById('ret-note').value = '';
        toggleReturnIssueNote();
        updateHeader();
        await refreshManagementStats();
        resetMgmtEmployeeCode();
      } catch (e) { showToast(e.message, true); btn.disabled = false; }
    }

    async function renderLog(el) {
      el.innerHTML = `<div class="page-header"><div><div class="page-title">ログ一覧</div><div class="page-sub" id="log-sub">読み込み中...</div></div></div>
  <div class="panel"><div class="panel-header"><div class="panel-title">履歴</div><div class="sep"></div>
  <div class="filter-bar">
    <input class="filter-input" type="text" placeholder="従業員コード..." id="log-q" value="${filterQuery}" oninput="filterQuery=this.value;loadLogs()">
    <select class="filter-select" onchange="filterStatus=this.value;loadLogs()">
      <option value="all" ${filterStatus === 'all' ? 'selected' : ''}>すべて</option>
      <option value="lending" ${filterStatus === 'lending' ? 'selected' : ''}>貸出中</option>
      <option value="returned" ${filterStatus === 'returned' ? 'selected' : ''}>返却済み</option>
    </select>
    <select class="filter-select" onchange="filterEventType=this.value;loadLogs()">
      <option value="all" ${filterEventType === 'all' ? 'selected' : ''}>種別: すべて</option>
      <optgroup label="貸出">
        <option value="lend_full_set" ${filterEventType === 'lend_full_set' ? 'selected' : ''}>端末一式貸出</option>
        <option value="lend_smartphone" ${filterEventType === 'lend_smartphone' ? 'selected' : ''}>スマホ貸出</option>
      </optgroup>
      <optgroup label="返却">
        <option value="return_full_set" ${filterEventType === 'return_full_set' ? 'selected' : ''}>端末一式返却</option>
        <option value="return_smartphone" ${filterEventType === 'return_smartphone' ? 'selected' : ''}>スマホ返却</option>
        <option value="return_dock_cable" ${filterEventType === 'return_dock_cable' ? 'selected' : ''}>台座・コード返却</option>
      </optgroup>
    </select>
  </div></div>
  <div class="table-wrap" id="log-table"><div class="empty">読み込み中...</div></div></div>`;
      loadLogs();
    }

    async function loadLogs() {
      const params = new URLSearchParams({ limit: 200 });
      if (filterStatus !== 'all') params.set('status', filterStatus);
      if (filterQuery) params.set('q', filterQuery);
      try {
        const loans = await apiFetch('/loans?' + params);
        const allEvents = buildLoanLogEvents(loans);
        const events = filterEventType === 'all' ? allEvents : allEvents.filter(e => {
          if (filterEventType === 'lend_full_set') return e.event === '貸出' && e.itemType === '端末一式';
          if (filterEventType === 'lend_smartphone') return e.event === '貸出' && e.itemType === 'スマホ';
          if (filterEventType === 'return_full_set') return e.event === '返却' && e.itemType === '端末一式';
          if (filterEventType === 'return_smartphone') return e.event === '返却' && e.itemType === 'スマホ';
          if (filterEventType === 'return_dock_cable') return e.event === '返却' && e.itemType === '台座・コード';
          return true;
        });
        document.getElementById('log-sub').textContent = `${events.length} 件（貸出 ${loans.length} 件）`;
        document.getElementById('log-table').innerHTML = events.length === 0
          ? '<div class="empty">該当するログがありません</div>'
          : `<table><thead><tr><th>No</th><th>ID</th><th>イベント</th><th>種別</th><th>従業員コード</th><th>日時</th><th>詳細</th></tr></thead><tbody>${events.map(e => `<tr>
          <td style="font-family:var(--mono);font-size:12px;color:var(--text)">${e.no || '-'}</td>
          <td><span class="device-id">${e.deviceIdCode || '-'}</span></td>
          <td><span class="status-pill ${e.eventClass || 'status-avail'}">${e.event}</span></td>
          <td style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${e.itemType}</td>
          <td style="font-family:var(--mono);font-size:11px;color:var(--text-muted)">${e.actor || '-'}</td>
          <td class="time-cell">${fmt(e.at)}</td>
          <td style="color:var(--text-muted)">${e.detail || '-'}</td>
        </tr>`).join('')
          }</tbody></table>`;
      } catch (e) { showToast(e.message, true); }
    }

    function buildLoanLogEvents(loans) {
      const events = [];
      const seenBrokenEvents = new Set();
      const seenRecoveredEvents = new Set();
      const seenRetiredEvents = new Set();
      const seenDeletedEvents = new Set();

      for (const loan of loans) {
        const no = loan.device?.no || '-';
        const deviceIdCode = loan.device?.device_id_code || '-';
        const deviceStatus = loan.device?.status || 'active';
        const smartphoneLoans = Array.isArray(loan.smartphone_loans) ? loan.smartphone_loans : [];
        const loanSmartphoneReturnedTs = loan.smartphone_returned_at ? new Date(loan.smartphone_returned_at).getTime() : null;
        const dockCableReturnedTs = loan.dock_returned_at
          ? new Date(loan.dock_returned_at).getTime()
          : loan.cable_returned_at ? new Date(loan.cable_returned_at).getTime() : null;
        const isLoanLevelFullSetReturn = loanSmartphoneReturnedTs !== null && dockCableReturnedTs !== null && loanSmartphoneReturnedTs === dockCableReturnedTs;
        const returnedSmartphoneRecord = loanSmartphoneReturnedTs === null
          ? null
          : smartphoneLoans.find(sl => sl.returned_at && new Date(sl.returned_at).getTime() === loanSmartphoneReturnedTs) || null;
        const initialBundleSmartphoneLoan = smartphoneLoans.find(sl =>
          (sl.user_employee_id || '').toUpperCase() === (loan.user_employee_id || '').toUpperCase() &&
          sl.lent_at === loan.lent_at
        );
        const fullSetRuleStatus = initialBundleSmartphoneLoan == null
          ? '-'
          : (initialBundleSmartphoneLoan.test_course_rule_confirmed ? '済' : '未');

        events.push({
          no,
          deviceIdCode,
          event: '貸出',
          eventClass: 'status-lending',
          itemType: '端末一式',
          actor: loan.user_employee_id || '-',
          at: loan.lent_at,
          detail: `ルール遵守: ${fullSetRuleStatus}`,
        });

        for (const sl of smartphoneLoans) {
          const isInitialBundleLend =
            (sl.user_employee_id || '').toUpperCase() === (loan.user_employee_id || '').toUpperCase() &&
            sl.lent_at === loan.lent_at;
          const ruleStatus = sl.test_course_rule_confirmed ? '済' : '未';

          if (!isInitialBundleLend) {
            events.push({
              no,
              deviceIdCode,
              event: '貸出',
              eventClass: 'status-lending',
              itemType: 'スマホ',
              actor: sl.user_employee_id || '-',
              at: sl.lent_at,
              detail: `ルール遵守: ${ruleStatus}`,
            });
          }

          if (sl.returned_at) {
            const hasDockOrCableReturn = loan.dock_returned_at || loan.cable_returned_at;
            const dockCableReturnTime = loan.dock_returned_at
              ? new Date(loan.dock_returned_at).getTime()
              : loan.cable_returned_at ? new Date(loan.cable_returned_at).getTime() : null;
            const spReturnTime = new Date(sl.returned_at).getTime();
            const isSimultaneousReturn = dockCableReturnTime !== null && spReturnTime === dockCableReturnTime;
            const isLoanLevelMatchedReturn = hasDockOrCableReturn && loanSmartphoneReturnedTs !== null && spReturnTime === loanSmartphoneReturnedTs && isLoanLevelFullSetReturn;
            const isInitialBundleReturn = isInitialBundleLend && hasDockOrCableReturn && isSimultaneousReturn;

            if (isInitialBundleReturn || isLoanLevelMatchedReturn) {
              continue;
            }

            events.push({
              no,
              deviceIdCode,
              event: '返却',
              eventClass: 'status-returned',
              itemType: 'スマホ',
              actor: sl.returned_by_employee_id || sl.user_employee_id || '-',
              at: sl.returned_at,
              detail: '-',
            });
          }
        }

        if (loan.dock_returned_at || loan.cable_returned_at) {
          const initialBundleSmartphoneReturned = initialBundleSmartphoneLoan?.returned_at;
          const cableText = loan.cable_weight_ok == null ? '未確認' : (loan.cable_weight_ok ? '確認済' : '不良');

          const dockCableTs = loan.dock_returned_at
            ? new Date(loan.dock_returned_at).getTime()
            : loan.cable_returned_at ? new Date(loan.cable_returned_at).getTime() : null;
          const spTs = initialBundleSmartphoneReturned ? new Date(initialBundleSmartphoneReturned).getTime() : null;
          const isSameOperation = spTs !== null && dockCableTs !== null && spTs === dockCableTs;
          const shouldRenderFullSetReturn = (initialBundleSmartphoneReturned && isSameOperation) || isLoanLevelFullSetReturn;

          if (shouldRenderFullSetReturn) {
            const at = Math.max(
              loanSmartphoneReturnedTs || spTs || 0,
              loan.cable_returned_at ? new Date(loan.cable_returned_at).getTime() : 0,
              loan.dock_returned_at ? new Date(loan.dock_returned_at).getTime() : 0
            );

            events.push({
              no,
              deviceIdCode,
              event: '返却',
              eventClass: 'status-returned',
              itemType: '端末一式',
              actor: returnedSmartphoneRecord?.returned_by_employee_id || returnedSmartphoneRecord?.user_employee_id || initialBundleSmartphoneLoan?.returned_by_employee_id || initialBundleSmartphoneLoan?.user_employee_id || '-',
              at: new Date(at).toISOString(),
              detail: `ケーブル重量: ${cableText}`,
            });
          } else {
            const at = loan.cable_returned_at || loan.dock_returned_at;
            events.push({
              no,
              deviceIdCode,
              event: '返却',
              eventClass: 'status-returned',
              itemType: '台座・コード',
              actor: '-',
              at,
              detail: `ケーブル重量: ${cableText}`,
            });
          }
        }

        const brokenAt = loan.broken_at || loan.device?.broken_at;
        const brokenActor = loan.broken_reported_by || loan.device?.broken_reported_by || '-';
        const brokenDetail = loan.broken_note || loan.device?.broken_note || '-';
        if (brokenAt) {
          const brokenKey = `${loan.device_id}|${brokenAt}|${brokenActor}|${brokenDetail}`;
          if (!seenBrokenEvents.has(brokenKey)) {
            seenBrokenEvents.add(brokenKey);
            events.push({
              no,
              deviceIdCode,
              event: '故障',
              eventClass: 'status-broken',
              itemType: '端末',
              actor: brokenActor,
              at: brokenAt,
              detail: brokenDetail,
            });
          }
        }

        if (loan.device?.recovered_at) {
          const recoveredKey = `${loan.device_id}|${loan.device?.recovered_at}`;
          if (!seenRecoveredEvents.has(recoveredKey)) {
            seenRecoveredEvents.add(recoveredKey);
            events.push({
              no,
              deviceIdCode,
              event: '復帰',
              eventClass: 'status-avail',
              itemType: '端末',
              actor: '-',
              at: loan.device?.recovered_at,
              detail: deviceStatus === 'active' ? '運用復帰' : 'ステータス更新',
            });
          }
        }

        if (loan.device?.retired_at) {
          const retiredKey = `${loan.device_id}|${loan.device?.retired_at}`;
          if (!seenRetiredEvents.has(retiredKey)) {
            seenRetiredEvents.add(retiredKey);
            events.push({
              no,
              deviceIdCode,
              event: '廃却',
              eventClass: 'status-retired',
              itemType: '端末',
              actor: '-',
              at: loan.device?.retired_at,
              detail: '運用終了',
            });
          }
        }

        if (loan.device?.deleted_at) {
          const deletedKey = `${loan.device_id}|${loan.device?.deleted_at}`;
          if (!seenDeletedEvents.has(deletedKey)) {
            seenDeletedEvents.add(deletedKey);
            events.push({
              no,
              deviceIdCode,
              event: '削除',
              eventClass: 'status-retired',
              itemType: '端末',
              actor: '-',
              at: loan.device?.deleted_at,
              detail: '端末DELETE',
            });
          }
        }
      }

      events.sort((a, b) => {
        const atA = a.at ? new Date(a.at).getTime() : 0;
        const atB = b.at ? new Date(b.at).getTime() : 0;
        return atB - atA;
      });

      return events;
    }

    async function renderDevices(el) {
      el.innerHTML = `<div class="page-header"><div><div class="page-title">端末管理</div><div class="page-sub" id="dev-sub">読み込み中...</div></div></div>
  <div class="panel">
    <div class="panel-header"><div class="panel-title">端末を追加</div></div>
    <div class="form-grid cols-5">
      <div class="field"><label>No</label><input type="text" id="dev-no" placeholder="例: 1"></div>
      <div class="field"><label>ID（任意）</label><input type="text" id="dev-idcode" placeholder="例: tt00000"></div>
      <div class="field"><label>Memo</label><input type="text" id="dev-memo" placeholder="例: 090-1234-5678 など"></div>
      <div></div>
      <button class="btn-primary" id="dev-add-btn" onclick="addDevice()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        追加
      </button>
    </div>
  </div>
  <div class="panel">
    <div class="panel-header"><div class="panel-title">端末一覧</div><div class="sep"></div>
    <input class="filter-input" type="text" placeholder="No・ID・Memoで検索..." id="dev-q" oninput="filterDevices(this.value)">
    </div>
    <div class="table-wrap" id="dev-table"><div class="empty">読み込み中...</div></div>
  </div>
  <div class="panel" style="border-color: rgba(248,113,113,.35);">
    <div class="panel-header">
      <div class="panel-title" style="color: var(--danger);">データ管理（危険操作）</div>
    </div>
    <div class="form-grid cols-4">
      <div class="field">
        <label>削除対象</label>
        <select id="dev-delete-target"></select>
      </div>
      <div class="field">
        <label>確認入力</label>
        <input type="text" id="dev-delete-confirm" placeholder="DELETE と入力" oninput="toggleDangerDeleteButton()">
      </div>
      <div class="field">
        <label>注意</label>
        <div class="field-help warn">削除は端末を一覧から除外する破壊的操作です。通常運用では使用しません。</div>
      </div>
      <button class="btn-danger" id="dev-delete-btn" onclick="handleDangerDelete()" disabled>削除実行</button>
    </div>
  </div>`;
      await loadDevices();
    }

    let allDevicesList = [];

    async function loadDevices() {
      try {
        allDevicesList = await apiFetch('/devices');
        document.getElementById('dev-sub').textContent = `${allDevicesList.length} 台登録中`;
        renderDeviceTable(allDevicesList);
        renderDangerDeleteTargets();
        toggleDangerDeleteButton();
      } catch (e) { showToast(e.message, true); }
    }

    function filterDevices(q) {
      const lq = q.toLowerCase();
      const filtered = allDevicesList.filter(d =>
        (d.no || '').toLowerCase().includes(lq) ||
        (d.device_id_code || '').toLowerCase().includes(lq) ||
        (d.memo || '').toLowerCase().includes(lq)
      );
      renderDeviceTable(filtered);
    }

    function renderDeviceTable(devices) {
      const wrap = document.getElementById('dev-table');
      if (!wrap) return;
      wrap.innerHTML = devices.length === 0 ? '<div class="empty">端末が見つかりません</div>'
        : `<table><thead><tr><th>No</th><th>ID</th><th>Memo</th><th>ステータス</th><th>操作</th></tr></thead><tbody>${devices.map(d => `<tr>
        <td style="font-family:var(--mono);font-size:12px;color:var(--text)">${d.no || '-'}</td>
        <td><span class="device-id">${d.device_id_code || '-'}</span></td>
        <td style="color:var(--text-dim)">${d.memo || '-'}</td>
        <td>
          <span class="status-pill ${d.is_lending ? 'status-lending' : (d.status === 'retired' ? 'status-retired' : (d.status === 'broken' ? 'status-broken' : 'status-avail'))}">
            ${d.is_lending ? '貸出中' : (d.status === 'retired' ? '廃却' : (d.status === 'broken' ? '故障中' : '空き'))}
          </span>
        </td>
        <td>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-height:34px;">
            ${(!d.is_lending && d.status === 'broken') ? `<button class="btn-secondary" style="color:var(--accent);border-color:rgba(74,222,128,.35);background:var(--accent-dim);height:auto;padding:8px 12px" onclick="setDeviceStatus(${d.id}, 'active', '${d.no || d.device_id_code || '-'}')">復帰</button>
              <button class="btn-danger" onclick="setDeviceStatus(${d.id}, 'retired', '${d.no || d.device_id_code || '-'}')">廃却</button>` : ''}
            ${(!d.is_lending && d.status === 'retired') ? `<button class="btn-secondary" style="color:var(--accent);border-color:rgba(74,222,128,.35);background:var(--accent-dim);height:auto;padding:8px 12px" onclick="setDeviceStatus(${d.id}, 'active', '${d.no || d.device_id_code || '-'}')">復帰</button>` : ''}
            ${(d.is_lending || d.status === 'active') ? '<span style="font-size:12px;color:var(--text-muted);">-</span>' : ''}
          </div>
        </td>
      </tr>`).join('')
        }</tbody></table>`;
    }

    function renderDangerDeleteTargets() {
      const select = document.getElementById('dev-delete-target');
      if (!select) return;
      const deletable = allDevicesList.filter(d => !d.is_lending);
      if (deletable.length === 0) {
        select.innerHTML = '<option value="">削除可能な端末がありません</option>';
        return;
      }
      select.innerHTML = '<option value="">削除対象を選択</option>' + deletable
        .map(d => `<option value="${d.id}" data-code="${d.no || d.device_id_code || '-'}">No ${d.no || '-'} / ${d.device_id_code || '-'} / ${d.status === 'retired' ? '廃却' : (d.status === 'broken' ? '故障中' : '空き')}</option>`)
        .join('');
    }

    function toggleDangerDeleteButton() {
      const btn = document.getElementById('dev-delete-btn');
      const select = document.getElementById('dev-delete-target');
      const confirmInput = document.getElementById('dev-delete-confirm');
      if (!btn || !select || !confirmInput) return;
      btn.disabled = !(select.value && confirmInput.value.trim().toUpperCase() === 'DELETE');
    }

    async function handleDangerDelete() {
      const select = document.getElementById('dev-delete-target');
      const confirmInput = document.getElementById('dev-delete-confirm');
      if (!select || !confirmInput) return;
      const id = parseInt(select.value);
      if (!id) { showToast('削除対象を選択してください', true); return; }
      if (confirmInput.value.trim().toUpperCase() !== 'DELETE') { showToast('確認入力に DELETE を入力してください', true); return; }
      const code = select.options[select.selectedIndex]?.dataset?.code || `ID:${id}`;
      await deleteDevice(id, code, true);
      confirmInput.value = '';
      toggleDangerDeleteButton();
    }

    async function setDeviceStatus(id, status, code) {
      const statusLabel = status === 'active' ? '復帰' : (status === 'retired' ? '廃却' : '故障中');
      if (!confirm(` 「${code}」を${statusLabel}に変更しますか？`)) return;
      try {
        await apiFetch(`/devices/${id}/status`, {
          method: 'PATCH',
          body: JSON.stringify({ status })
        });
        showToast(`${code} のステータスを更新しました`);
        await loadDevices();
      } catch (e) { showToast(e.message, true); }
    }

    async function addDevice() {
      const no = document.getElementById('dev-no')?.value.trim();
      const idcode = document.getElementById('dev-idcode')?.value.trim();
      const memo = document.getElementById('dev-memo')?.value.trim();
      if (!no) { showToast('Noを入力してください', true); return; }
      const btn = document.getElementById('dev-add-btn');
      btn.disabled = true;
      try {
        await apiFetch('/devices', { method: 'POST', body: JSON.stringify({ no: no || null, device_id_code: idcode || null, memo: memo || null }) });
        showToast(`No ${no} を追加しました`);
        ['dev-no', 'dev-idcode', 'dev-memo'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
        await loadDevices();
      } catch (e) { showToast(e.message, true); }
      btn.disabled = false;
    }

    async function deleteDevice(id, code, skipConfirm = false) {
      if (!skipConfirm && !confirm(`「${code}」を削除しますか？\n（論理削除のため貸出履歴は残ります）`)) return;
      try {
        await apiFetch(`/devices/${id}`, { method: 'DELETE' });
        showToast(`${code} を削除しました`);
        await loadDevices();
      } catch (e) { showToast(e.message, true); }
    }

    showTab('management');
  </script>
</body>

</html>
